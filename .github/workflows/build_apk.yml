name: Build APK

on:
  push:
    branches: [ main, master, "copilot/**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Android NDKs
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set" >&2
            exit 1
          fi
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found at $SDKMANAGER" >&2
            exit 1
          fi
          yes 2>/dev/null | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "ndk;28.2.13676358" "ndk;27.0.11902837"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-annotator-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-annotator-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
