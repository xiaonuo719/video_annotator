name: video_annotator
description: "视频标注工具 - 实时标记亮点/不足，输出 TXT 供 video-cutter 自动剪辑"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  provider: ^6.1.2
  wakelock_plus: ^1.2.8
  record: ^6.0.0
  whisper_flutter_new: ^1.0.1
  uuid: ^4.5.1
  just_audio: ^0.9.40
  permission_handler: ^10.4.5
  vosk_flutter: ^0.3.48

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
